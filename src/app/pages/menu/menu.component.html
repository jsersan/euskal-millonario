<div class="menu-container">
  <div class="menu-card">
    <div class="lauburu-decoration">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,20 L120,60 L160,50 L140,90 L180,100 L140,110 L160,150 L120,140 L100,180 L80,140 L40,150 L60,110 L20,100 L60,90 L40,50 L80,60 Z" 
              fill="var(--euskal-red)" stroke="var(--euskal-green)" stroke-width="3" opacity="0.2"/>
        <circle cx="100" cy="100" r="15" fill="var(--euskal-white)" opacity="0.3"/>
      </svg>
    </div>

    <h1 class="game-title">Euskal Milionarioa</h1>
    <p class="game-subtitle">50x15 - Euskal kultura eta historia</p>

    <div class="game-info">
      <div class="info-item">
        <span class="info-icon">❓</span>
        <span class="info-text">15 galdera</span>
      </div>
      <div class="info-item">
        <span class="info-icon">💰</span>
        <span class="info-text">Milioi bat euro</span>
      </div>
      <div class="info-item">
        <span class="info-icon">🎯</span>
        <span class="info-text">50-50 aukera</span>
      </div>
    </div>

    <button class="start-button" (click)="startGame()">
      <span class="button-text">Jolastu hasi</span>
      <span class="button-icon">▶</span>
    </button>

    <div class="game-instructions">
      <p><strong>Nola jokatu:</strong></p>
      <ul>
        <li>15 galdera Euskal Herriari buruz</li>
        <li>Erantzun zuzena aukeratu</li>
        <li>Zailtasuna gora egingo du</li>
        <li>Irabazi milioi bat euro!</li>
      </ul>
    </div>
  </div>
</div>
